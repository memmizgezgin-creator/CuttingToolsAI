[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# BUG 1 FIX: Root → Advisor page
[[redirects]]
  from = "/"
  to = "/ToolAdvisor.html"
  status = 200
  force = true

# Advisor URL aliases
[[redirects]]
  from = "/advisor"
  to = "/ToolAdvisor.html"
  status = 200

[[redirects]]
  from = "/advisor.html"
  to = "/ToolAdvisor.html"
  status = 301
  force = true

# Clean catalog URL — serves the React/Supabase catalog (index.html)
# catalog.html is a static dark-theme dump; NOT the live catalog
[[redirects]]
  from = "/catalog"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/catalog.html"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.tooladvisor.eu/*"
  to = "https://tooladvisor.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://tooladvisor.eu/*"
  to = "https://tooladvisor.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tooladvisor.eu/*"
  to = "https://tooladvisor.eu/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com https://plausible.io https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://plausible.io https://*.google-analytics.com https://api.anthropic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

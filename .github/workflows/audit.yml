name: Weekly Audit
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run audit
        run: node scripts/weekly-audit.js
        env:
          LIGHTHOUSE_URL: ${{ secrets.LIGHTHOUSE_URL || 'https://tooladvisor.eu' }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile · ToolAdvisor</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Nunito:wght@500;700;800&family=DM+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="tw-config.js"></script>
  <link rel="stylesheet" href="polish.css"/>
</head>
<body class="bg-surface text-on-surface font-body-md">
  <main class="ml-sidebar-width min-h-screen p-container-margin">
    <section class="max-w-4xl mx-auto space-y-4">
      <div class="bg-surface-card rounded-2xl border border-border-warm p-6">
        <p class="font-label-caps text-xs uppercase tracking-widest text-on-surface-variant">Account</p>
        <h1 class="font-section-heading text-primary text-3xl mt-2">Profile</h1>
        <p id="ta-profile-email" class="mt-2 text-on-surface-variant"></p>
        <button id="ta-profile-signout" class="mt-4 px-4 py-2 rounded-lg border border-border-warm text-primary font-bold hover:bg-surface-container-low transition-colors">Sign out</button>
      </div>

      <div class="bg-surface-card rounded-2xl border border-border-warm p-6">
        <div class="flex items-center justify-between">
          <h2 class="font-section-heading text-xl text-primary">Saved tools</h2>
          <span id="ta-saved-count" class="font-technical-data text-xs text-on-surface-variant">0 items</span>
        </div>
        <ul id="ta-saved-list" class="mt-4 space-y-2"></ul>
        <p id="ta-saved-empty" class="text-on-surface-variant text-sm mt-2">No saved tools yet. Use Save button on product cards.</p>
      </div>
    </section>
  </main>

  <script src="page-switcher.js"></script>
  <script>
    (async function () {
      function renderSavedRows(rows) {
        const list = document.getElementById('ta-saved-list');
        const empty = document.getElementById('ta-saved-empty');
        const count = document.getElementById('ta-saved-count');
        if (!list || !empty || !count) return;
        list.innerHTML = '';
        count.textContent = rows.length + ' items';
        if (!rows.length) {
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        rows.forEach((row) => {
          const li = document.createElement('li');
          li.className = 'flex items-center justify-between px-3 py-2 rounded-lg bg-surface-container-low border border-border-warm';
          li.innerHTML = '<span class="font-technical-data text-sm text-ink-text">' + row.sku + '</span>';
          list.appendChild(li);
        });
      }

      function waitForApi() {
        return new Promise((resolve) => {
          const run = () => window.taSupabase ? resolve(window.taSupabase) : setTimeout(run, 80);
          run();
        });
      }

      const api = await waitForApi();
      await api.refreshSession();
      const user = api.getUser();
      if (!user) {
        window.location.href = '/?signin=1';
        return;
      }
      const emailEl = document.getElementById('ta-profile-email');
      if (emailEl) emailEl.textContent = user.email || '';

      const rows = await api.fetchSavedTools();
      renderSavedRows(rows);

      const btn = document.getElementById('ta-profile-signout');
      if (btn) {
        btn.addEventListener('click', async () => {
          await api.signOut();
          window.location.href = '/';
        });
      }

      window.addEventListener('ta:saved-tools-updated', async () => {
        const fresh = await api.fetchSavedTools();
        renderSavedRows(fresh);
      });
    })();
  </script>
</body>
</html>
